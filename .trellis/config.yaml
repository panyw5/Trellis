# Trellis Configuration
# Project-level settings for the Trellis workflow system
#
# All values have sensible defaults. Only override what you need.

#-------------------------------------------------------------------------------
# Session Recording
#-------------------------------------------------------------------------------

# Commit message used when auto-committing journal/index changes
# after running add_session.py
session_commit_message: "chore: record journal"

# Maximum lines per journal file before rotating to a new one
max_journal_lines: 2000

#-------------------------------------------------------------------------------
# Packages (Monorepo)
#-------------------------------------------------------------------------------

# Declare packages in this project and their source code paths.
# If omitted, Trellis assumes a single-repo layout (spec/backend/, spec/frontend/).
#
packages:
  cli:
    path: packages/cli
  docs-site:
    path: docs-site
    type: submodule

# Default package used when --package is not specified.
default_package: cli

#-------------------------------------------------------------------------------
# Task Lifecycle Hooks
#-------------------------------------------------------------------------------

# Shell commands to run after task lifecycle events.
# Each hook receives TASK_JSON_PATH environment variable pointing to task.json.
# Hook failures print a warning but do not block the main operation.
#
#-------------------------------------------------------------------------------
# Update Skip Paths
#-------------------------------------------------------------------------------

# Files or directories to skip during `trellis update`.
# Use this to prevent update from re-adding files you intentionally removed.
#
update:
  skip:
    - .claude/commands/trellis/before-frontend-dev.md
    - .claude/commands/trellis/before-backend-dev.md
    - .claude/commands/trellis/check-frontend.md
    - .claude/commands/trellis/check-backend.md
    - .cursor/commands/trellis-before-frontend-dev.md
    - .cursor/commands/trellis-before-backend-dev.md
    - .cursor/commands/trellis-check-frontend.md
    - .cursor/commands/trellis-check-backend.md
    - .agents/skills/before-frontend-dev/
    - .agents/skills/before-backend-dev/
    - .agents/skills/check-frontend/
    - .agents/skills/check-backend/

#-------------------------------------------------------------------------------
# Task Lifecycle Hooks
#-------------------------------------------------------------------------------

hooks:
  after_create:
    - "python3 .trellis/scripts/hooks/linear_sync.py create"
  after_start:
    - "python3 .trellis/scripts/hooks/linear_sync.py start"
  after_archive:
    - "python3 .trellis/scripts/hooks/linear_sync.py archive"
